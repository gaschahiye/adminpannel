name: flutter_responsive_admin_panel
description: "Flutter Responsive Admin Panel"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter

  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  fl_chart: ^0.66.0 # Updated to a more stable version for Flutter 3.x
  flutter_screenutil: ^5.9.0
  get: ^4.6.6
  iconsax_flutter: ^1.0.1
  shared_preferences: ^2.2.2
  timeago: ^3.6.1
  percent_indicator: ^4.2.3
  fluttertoast: ^8.2.4
  socket_io_client: ^2.0.2
  flutter_local_notifications: ^17.0.0 # Updated
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2
  file_picker: ^10.3.8
  http: ^1.2.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/ZonesJson/Zones.json

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
          weight: 400
        - asset: assets/fonts/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Abel
      fonts:
        - asset: assets/fonts/Abel-Regular.ttf
    - family: Roboto Mono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/RobotoMono-Bold.ttf
          weight: 700
    - family: Noto Sans Symbols
      fonts:
        - asset: assets/fonts/NotoSansSymbols-Regular.ttf